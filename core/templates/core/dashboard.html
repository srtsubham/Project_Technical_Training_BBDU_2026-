{% extends 'core/base.html' %} {% block c %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Student: {{ user.username }}</h2>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}<button class="btn btn-danger">Logout</button>
    </form>
</div>
<div class="row">
    <div class="col-md-7">
        <div class="card shadow p-3">
            <h4>Enrolled Courses</h4>
            <table class="table">
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in e %}
                    <tr>
                        <td>{{ i.c.n }}</td>
                        <td>{{ i.g }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2">No data available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="col-md-5">
        <div class="card shadow p-3">
            <h4>Grade Trend</h4>
            <canvas id="gradeChart"></canvas>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    new Chart(document.getElementById('gradeChart'), {
        type: 'bar',
        data: {
            labels: [{% for i in e %}"{{ i.c.n }}",{% endfor %}],
            datasets: [{ label: 'Performance', data: [80, 90, 75, 95] }] // Simple visual logic
        }
    });
</script>
{% endblock %}
